<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#121926" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" id="theme-color-meta" content="#ffffff" />
  <title>Agent Task | OpenClaw任务管理</title>
  <link rel="icon" type="image/svg+xml" href="/src/logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet" />
  <script>
    (() => {
      const stored = window.localStorage.getItem('agent-task-theme');
      const preference = stored === 'light' || stored === 'dark' || stored === 'system'
        ? stored
        : 'system';
      const resolved = preference === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : preference;
      const themeColor = resolved === 'dark' ? '#121926' : '#ffffff';
      document.documentElement.dataset.theme = resolved;
      document.documentElement.style.colorScheme = resolved;
      const meta = document.getElementById('theme-color-meta');
      if (meta) meta.setAttribute('content', themeColor);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
