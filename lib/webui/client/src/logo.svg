<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.05"/>
    </filter>
  </defs>

  <!-- 底层 -->
  <rect x="14" y="34" width="92" height="72" rx="14"
        fill="#7986CB" filter="url(#shadow3)"/>

  <!-- 中层 -->
  <rect x="18" y="24" width="84" height="72" rx="12"
        fill="#5C6BC0" filter="url(#shadow2)"/>

  <!-- 顶层 -->
  <rect x="22" y="14" width="76" height="72" rx="11"
        fill="#3F51B5" filter="url(#shadow1)"/>

  <!-- 文本线（顶层，内容等比缩放） -->
  <line x1="30.2" y1="30.6" x2="61.8" y2="30.6"
        stroke="#ffffff" stroke-width="2.4"
        stroke-linecap="round" opacity="0.9"/>

  <line x1="30.2" y1="40.2" x2="70.2" y2="40.2"
        stroke="#ffffff" stroke-width="2.4"
        stroke-linecap="round" opacity="0.6"/>

  <line x1="30.2" y1="49.8" x2="54.4" y2="49.8"
        stroke="#ffffff" stroke-width="2.4"
        stroke-linecap="round" opacity="0.5"/>

  <!-- 进度圈（顶层，等比缩放） -->
  <circle cx="76" cy="59.4" r="11.5"
          fill="none"
          stroke="#ffffff"
          stroke-width="2.4"
          stroke-dasharray="36.4 72.7"
          stroke-linecap="round"
          opacity="0.85"
          transform="rotate(-90,76,59.4)"/>

  <circle cx="76" cy="59.4" r="3.8"
          fill="#ffffff" opacity="0.9"/>
</svg>